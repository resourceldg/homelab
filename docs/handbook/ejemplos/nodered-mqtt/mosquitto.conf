# Mosquitto para el laboratorio del aula.
# Listener MQTT en 1883. Acceso anónimo habilitado para simplificar las pruebas
# (es un entorno de clase, no de producción). Si querés autenticación, agregá
# `password_file` y poné `allow_anonymous false`.
listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
