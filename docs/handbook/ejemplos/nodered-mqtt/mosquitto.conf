# Mosquitto para el laboratorio del aula.
# Listener MQTT en 1883. Por defecto, acceso ANÓNIMO: el broker solo se alcanza
# en loopback (127.0.0.1) a través de tu túnel SSH autenticado, así que la puerta
# de entrada ya está protegida por tu login.
listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# ---------------------------------------------------------------------------
# ACTIVAR AUTENTICACIÓN (opcional)
# Tu equipo ya tiene una credencial MQTT provista por el aula, en
# .shared-services.env:  MQTT_USER / MQTT_PASSWORD.
#
# 1. Generá el password_file (una vez). Como alumno no tenés docker, pedíselo a
#    tu instructor, que corre en el dir del equipo:
#
#      set -a; . .shared-services.env; set +a
#      docker run --rm -v "$PWD/mosquitto:/m" eclipse-mosquitto:2.0 \
#        mosquitto_passwd -b -c /m/passwd "$MQTT_USER" "$MQTT_PASSWORD"
#
# 2. En este archivo, poné `allow_anonymous false` y descomentá la línea de abajo.
# 3. En compose.yml, montá el passwd file en el servicio mosquitto (read-only):
#      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
# 4. `labctl restart`. En Node-RED, en el nodo MQTT-broker cargá usuario/clave
#    (${MQTT_USER} / ${MQTT_PASSWORD}).
#
# password_file /mosquitto/config/passwd
