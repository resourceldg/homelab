# Inventory. The server can be managed locally (recommended for a home box)
# or over the Tailscale interface from a laptop.
#
# Local run (Ansible runs ON the server itself):
#     ansible-playbook site.yml --connection=local
#
# Remote run (over Tailscale/LAN):
#     set ansible_host to the tailnet IP or LAN IP below.

[homeserver]
homelab-01 ansible_host=127.0.0.1 ansible_connection=local

[homeserver:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
