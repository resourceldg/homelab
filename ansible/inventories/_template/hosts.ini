# =============================================================================
# PLANTILLA DE INVENTARIO — un archivo por SITIO (una casa, un colegio…).
#
# Para crear un sitio nuevo, NO se edita este directorio: se copia.
#     make new-site NAME=colegio-norte
# (o a mano: cp -r inventories/_template inventories/colegio-norte)
#
# Modelo: un inventario = un sitio. Dentro de un sitio puede haber varios
# servidores; cada uno lleva su identidad en host_vars/<hostname>.yml, y lo
# común al sitio (dominio, zona horaria, vault) vive en group_vars/all.
# =============================================================================

[homeserver]
# Un solo servidor por ahora. Para agregar otro en el mismo sitio, se suma otra
# línea con su hostname y se crea host_vars/<hostname>.yml con su identidad.
REPLACE_HOSTNAME ansible_host=127.0.0.1 ansible_connection=local

[homeserver:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
