---
# =============================================================================
# PRODUCTION overrides — identity, network and public-facing config for the
# real home server. These win over role defaults and the shared baseline.
# Secrets live next to this file in vault.yml (encrypted).
# =============================================================================

# --- Identity --------------------------------------------------------------
server_hostname: "homelab-01"
server_timezone: "America/Argentina/Buenos_Aires"
server_locale: "es_AR.UTF-8"

# --- Access model ----------------------------------------------------------
# SSH is reachable only from the LAN and the Tailscale CGNAT range.
lan_cidr: "192.168.100.0/24"
tailscale_cidr: "100.64.0.0/10"       # Tailscale/CGNAT shared range

# Public key for the automation account (admin_user): OpenSSH fallback for
# direct LAN access, complementing Tailscale SSH.
admin_ssh_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJAadQBUGIuyyl1uWWIzSQBSVrKvGFYacYzl4PuGACJ7 zen@zen-precision-3561"

# Human accounts (multi-user model).
#   homelab = operator (you): sudo WITH password (in sudo group), SSH allowed.
# A safety gate refuses to harden SSH while any ssh: true user still has a
# REPLACE_ME key. Add a 'familia' entry (ssh: false) when that account is needed.
extra_users:
  - name: homelab
    groups: [sudo]
    ssh: true
    authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJAadQBUGIuyyl1uWWIzSQBSVrKvGFYacYzl4PuGACJ7 zen@zen-precision-3561"

# --- Hardening -------------------------------------------------------------
# This homelab does NOT use Ubuntu Pro, so USG/CIS tooling stays off. The
# complementary hardening controls still apply. Only set true if you add a token.
usg_enabled: false

# --- Reverse proxy / DNS ---------------------------------------------------
caddy_base_domain: "lucasland.duckdns.org"
caddy_acme_email: "resourceldg@gmail.com"
duckdns_domains: "lucasland"          # -> lucasland.duckdns.org (no suffix)
