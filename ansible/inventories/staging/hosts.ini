# Staging inventory — a throwaway box/VM to validate changes before prod.
# Point ansible_host at the staging VM's Tailscale or LAN IP.
#
#     ansible-playbook site.yml -i inventories/staging --check --diff
#
# A local VM (multipass/lxd) is the cheapest staging target.

[homeserver]
homelab-staging ansible_host=127.0.0.1 ansible_connection=local

[homeserver:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
