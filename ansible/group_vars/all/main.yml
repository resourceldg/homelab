---
# =============================================================================
# SHARED BASELINE — cross-role values that are IDENTICAL across environments.
#
# Precedence model (lowest -> highest):
#   1. roles/<role>/defaults/main.yml      role-owned tunables
#   2. THIS FILE (group_vars/all)          cross-role constants, same everywhere
#   3. inventories/<env>/group_vars/all/   per-environment identity/network/secrets
#
# Anything that differs between prod and staging belongs in the inventory layer,
# NOT here. Anything owned by a single role belongs in that role's defaults.
# =============================================================================

# Administrative user (created by users_ssh; owns SSH keys, in sudo & docker).
# Consumed by users_ssh, docker, backups.
admin_user: "ansible"

# SSH port. Consumed by users_ssh, firewall, fail2ban.
# SSH is NEVER exposed to the internet — only reachable from LAN/Tailscale.
ssh_port: 22

# Third-party apt repos (Docker, Tailscale) are keyed by the release codename.
# Brand-new Ubuntu releases sometimes lag in vendor repos. If a repo 404s on a
# fresh 26.04, pin this to the previous LTS codename (e.g. "noble") until the
# vendor publishes 26.04. Defaults to the detected release.
apt_repo_release: "{{ ansible_distribution_release }}"

# Where compose stacks are deployed on the host. Consumed by docker, monitoring.
stacks_root: "/opt/homelab/stacks"
