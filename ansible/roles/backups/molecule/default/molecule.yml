---
# Converges the backups role across LTS versions. This is where the
# version-specific borgmatic schema (sectioned on 22.04 / flat on 24.04+) is
# actually exercised: `borgmatic init` parses the rendered config, so an
# invalid schema fails the converge.
role_name_check: 1

driver:
  name: docker

platforms:
  - name: "molecule-backups-${UBUNTU_IMAGE_TAG:-2404}"
    image: "geerlingguy/docker-ubuntu${UBUNTU_IMAGE_TAG:-2404}-ansible:latest"
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  config_options:
    defaults:
      interpreter_python: auto_silent

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
