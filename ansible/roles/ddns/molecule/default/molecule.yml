---
# Molecule scenario: converge the ddns role in a systemd-enabled container and
# assert idempotence. Host-level roles (ufw, apparmor, hardening) need real
# kernel features and are validated on the target host via `make verify`.
role_name_check: 1

driver:
  name: docker

platforms:
  - name: molecule-ddns
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    # Make the role under test discoverable (its parent is ansible/roles).
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  config_options:
    defaults:
      interpreter_python: auto_silent

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
