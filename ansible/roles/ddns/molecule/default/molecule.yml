---
# Molecule scenario: converge the ddns role in a systemd-enabled container and
# assert idempotence. Host-level roles (ufw, apparmor, hardening) need real
# kernel features and are validated on the target host via `make verify`.
role_name_check: 1

driver:
  name: docker

platforms:
  # Image tag is parametrised (UBUNTU_IMAGE_TAG); CI runs 2404. Defaults to
  # 24.04 for local runs.
  - name: "molecule-ddns-${UBUNTU_IMAGE_TAG:-2404}"
    image: "geerlingguy/docker-ubuntu${UBUNTU_IMAGE_TAG:-2404}-ansible:latest"
    command: /usr/lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    # Make the role under test discoverable (its parent is ansible/roles).
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  config_options:
    defaults:
      interpreter_python: auto_silent

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
