---
- name: Create the common classroom group (socket access for labctl)
  ansible.builtin.group:
    name: classroom
    state: present
  when: classroom_enabled | bool

- name: Create team groups
  ansible.builtin.group:
    name: "grp-{{ item.name }}"
    state: present
  loop: "{{ classroom_teams }}"
  loop_control:
    label: "grp-{{ item.name }}"
  when: classroom_enabled | bool

- name: Create student users (no sudo, not in docker group)
  ansible.builtin.user:
    name: "{{ item.1 }}"
    groups: ["grp-{{ item.0.name }}", "classroom"]
    append: true
    shell: "{{ classroom_user_shell }}"
    create_home: true
    state: present
    # Password = the student's SSO password (one credential for web and SSH).
    # Deterministic salt keeps the hash stable, so it's idempotent. If the
    # student has no vault_sso_passwords entry yet, the password is left unset.
    password: >-
      {{ (vault_sso_passwords[item.1] | password_hash('sha512', (item.1 ~ 'clsrm')[:16]))
         if (vault_sso_passwords is defined and item.1 in vault_sso_passwords)
         else omit }}
    update_password: always
  loop: "{{ classroom_teams | subelements('members') }}"
  loop_control:
    label: "{{ item.1 }} ({{ item.0.name }})"
  no_log: true
  when: classroom_enabled | bool
