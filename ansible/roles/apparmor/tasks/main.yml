---
- name: Install AppArmor and profiles
  ansible.builtin.apt:
    name:
      - apparmor
      - apparmor-utils
      - apparmor-profiles
      - apparmor-profiles-extra
    state: present

- name: Enable and start AppArmor
  ansible.builtin.systemd:
    name: apparmor
    enabled: true
    state: started

- name: Ensure AppArmor is enabled in the kernel cmdline
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash apparmor=1 security=apparmor"'
  notify: Update grub

- name: Set all profiles to enforce mode
  ansible.builtin.command: aa-enforce /etc/apparmor.d/*
  register: apparmor_enforce
  changed_when: "'Setting' in apparmor_enforce.stdout"
  failed_when: false
