---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/ubuntu"
    suites: ["{{ apt_repo_release }}"]
    components: [stable]
    architectures: ["{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"]
    signed_by: /etc/apt/keyrings/docker.asc
    enabled: true
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Deploy hardened daemon.json
  ansible.builtin.copy:
    content: "{{ docker_daemon_options | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart docker

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create stacks root directory
  ansible.builtin.file:
    path: "{{ stacks_root }}"
    state: directory
    mode: "0750"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"

- name: Create dedicated docker network for the proxy
  community.docker.docker_network:
    name: edge
    state: present
