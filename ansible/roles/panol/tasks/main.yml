---
# Levanta el plano de servicios del proyecto Pañol IoT: broker MQTT (al que
# hablan los ESP32), base de auditoría y tablero Node-RED. La aplicación
# (api + puente) vive en el repo panol-iot y se enchufa a la red `panol`.
#
# Las contraseñas se generan EN EL HOST, una sola vez, y quedan bajo
# /etc/panol/secrets (root). No van al vault: así se puede agregar un nodo sin
# editar secretos cifrados, y el que rota una clave es el que tiene la máquina.

- name: Ensure the panol config root exists
  ansible.builtin.file:
    path: "{{ panol_secrets_dir | dirname }}"
    state: directory
    owner: root
    group: "{{ admin_user }}"
    mode: "0750"
  when: panol_enabled | bool

- name: Ensure the panol secret store exists (root only)
  ansible.builtin.file:
    path: "{{ panol_secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: panol_enabled | bool

# `creates:` es lo que hace esto idempotente: la clave se fija una vez y después
# sobrevive a todas las converges. Si hay una clave por defecto declarada, se
# usa esa (sistema andando de entrada, credenciales conocidas); si no, se
# sortea en el host — nunca con el lookup `password` del controlador, para que
# el secreto no salga de la máquina. Borrar el .pass es lo que fuerza la rotación.
- name: Set the Postgres password (default or random, once)
  ansible.builtin.shell:
    cmd: |
      umask 077
      clave='{{ panol_db_default_password }}'
      [ -n "$clave" ] || clave="$(openssl rand -hex 24)"
      printf %s "$clave" > {{ panol_secrets_dir }}/postgres.pass
    creates: "{{ panol_secrets_dir }}/postgres.pass"
  args:
    executable: /bin/bash
  when: panol_enabled | bool

- name: Set one MQTT password per identity (default or random, once)
  ansible.builtin.shell:
    cmd: |
      umask 077
      clave='{{ panol_mqtt_default_passwords[item] | default("") }}'
      [ -n "$clave" ] || clave="$(openssl rand -hex 24)"
      printf %s "$clave" > {{ panol_secrets_dir }}/mqtt-{{ item }}.pass
    creates: "{{ panol_secrets_dir }}/mqtt-{{ item }}.pass"
  args:
    executable: /bin/bash
  loop: "{{ panol_mqtt_users | list }}"
  when: panol_enabled | bool

- name: Read the Postgres password
  ansible.builtin.slurp:
    src: "{{ panol_secrets_dir }}/postgres.pass"
  register: panol_pgpass_raw
  no_log: true
  when: panol_enabled | bool

- name: Read the MQTT passwords
  ansible.builtin.slurp:
    src: "{{ panol_secrets_dir }}/mqtt-{{ item }}.pass"
  loop: "{{ panol_mqtt_users | list }}"
  register: panol_mqttpass_raw
  no_log: true
  when: panol_enabled | bool

- name: Assemble the credentials for templating
  ansible.builtin.set_fact:
    panol_db_password: "{{ panol_pgpass_raw.content | b64decode }}"
    panol_mqtt_passwords: "{{ dict(panol_mqtt_users | list | zip(panol_mqtt_secret_values)) }}"
  vars:
    panol_mqtt_secret_values: "{{ panol_mqttpass_raw.results | map(attribute='content') | map('b64decode') | list }}"
  no_log: true
  when: panol_enabled | bool

# --- Stack ------------------------------------------------------------------
- name: Deploy the panol stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/panol/"
    dest: "{{ panol_stack_dir }}/"
    mode: "0644"
    directory_mode: "0750"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  notify: Restart panol mosquitto
  when: panol_enabled | bool

- name: Render the panol .env (ports, DB and broker credentials)
  ansible.builtin.template:
    src: panol.env.j2
    dest: "{{ panol_stack_dir }}/.env"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"
  no_log: true
  when: panol_enabled | bool

# --- Broker: identidades y permisos ----------------------------------------
# uid/gid 1883 es el usuario `mosquitto` dentro de la imagen: los archivos se
# montan read-only y tienen que ser legibles por él, y por nadie más.
- name: Render the mosquitto ACL (each node owns only its branch of the tree)
  ansible.builtin.template:
    src: mosquitto-acl.j2
    dest: "{{ panol_stack_dir }}/mosquitto/acl"
    owner: "1883"
    group: "1883"
    mode: "0640"
  notify: Restart panol mosquitto
  when: panol_enabled | bool

- name: Render the MQTT user list used to build the password file
  ansible.builtin.template:
    src: mqtt-users.tsv.j2
    dest: "{{ panol_secrets_dir }}/mqtt-users.tsv"
    owner: root
    group: root
    mode: "0600"
  register: panol_mqtt_userlist
  no_log: true
  when: panol_enabled | bool

- name: Check whether the mosquitto password file exists
  ansible.builtin.stat:
    path: "{{ panol_stack_dir }}/mosquitto/passwd"
  register: panol_passwd_file
  when: panol_enabled | bool

# mosquitto_passwd hashea; no hay forma de reproducir el hash desde Ansible.
# Se reconstruye solo cuando cambió la lista de usuarios o falta el archivo:
# regenerarlo siempre daría hashes nuevos en cada corrida (salt aleatorio) y
# rompería la idempotencia.
- name: Build the mosquitto password file (hashed with mosquitto_passwd)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      work="$(mktemp -d -p {{ panol_secrets_dir }})"
      trap 'rm -rf "$work"' EXIT
      : > "$work/passwd"
      while IFS=$'\t' read -r usuario clave; do
        [ -n "$usuario" ] || continue
        docker run --rm --user 0:0 --entrypoint mosquitto_passwd \
          -v "$work":/work {{ panol_mosquitto_image }} \
          -b /work/passwd "$usuario" "$clave"
      done < {{ panol_secrets_dir }}/mqtt-users.tsv
      install -o 1883 -g 1883 -m 0640 "$work/passwd" {{ panol_stack_dir }}/mosquitto/passwd
  args:
    executable: /bin/bash
  when:
    - panol_enabled | bool
    - panol_mqtt_userlist is changed or not (panol_passwd_file.stat.exists | default(false))
  changed_when: true
  no_log: true
  notify: Restart panol mosquitto

# --- Integración con EMATP --------------------------------------------------
# El token lo pone una persona en el servidor, no Ansible: viene de otro
# sistema (Vercel) y no tiene por qué pasar por este repo.
- name: Check whether the EMATP token is present
  ansible.builtin.stat:
    path: "{{ panol_secrets_dir }}/ematp.token"
  register: panol_ematp_token_file
  when: panol_enabled | bool

- name: Read the EMATP token
  ansible.builtin.slurp:
    src: "{{ panol_secrets_dir }}/ematp.token"
  register: panol_ematp_token_raw
  no_log: true
  when:
    - panol_enabled | bool
    - panol_ematp_token_file.stat.exists | default(false)

- name: Note whether the EMATP integration will be active
  ansible.builtin.debug:
    msg: >-
      EMATP: {{ 'configurado (' ~ panol_ematp_url ~ ')'
                if (panol_ematp_url | length > 0
                    and panol_ematp_token_file.stat.exists | default(false))
                else 'inactivo — falta ' ~
                     ('la URL' if panol_ematp_url | length == 0 else 'el token en '
                      ~ panol_secrets_dir ~ '/ematp.token') }}
  when: panol_enabled | bool

# --- Credenciales para quien las necesita ----------------------------------
- name: Render the app credentials file (api + puente del repo panol-iot)
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ panol_secrets_dir | dirname }}/app.env"
    owner: root
    group: "{{ admin_user }}"
    mode: "0640"
  no_log: true
  when: panol_enabled | bool

- name: Render the node credentials sheet (para grabar en los ESP32)
  ansible.builtin.template:
    src: nodos.txt.j2
    dest: "{{ panol_secrets_dir }}/nodos.txt"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: panol_enabled | bool

- name: Bring up the panol stack
  community.docker.docker_compose_v2:
    project_src: "{{ panol_stack_dir }}"
    state: present
    pull: missing
  when: panol_enabled | bool

# --- Grafana: acceso de SOLO LECTURA a la auditoría -------------------------
# Un panel que puede escribir en un registro de auditoría no es un panel, es un
# agujero. Por eso Grafana entra con su propio rol y solo con SELECT.
- name: Install psycopg2 for Postgres provisioning
  ansible.builtin.apt:
    name: python3-psycopg2
    state: present
  when: panol_enabled | bool and panol_grafana_enabled | bool

- name: Wait for the panol database to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ panol_pg_port }}"
    timeout: 90
  when: panol_enabled | bool and panol_grafana_enabled | bool

- name: Set the Grafana read-only password (default or random, once)
  ansible.builtin.shell:
    cmd: |
      umask 077
      clave='{{ panol_grafana_default_password }}'
      [ -n "$clave" ] || clave="$(openssl rand -hex 24)"
      printf %s "$clave" > {{ panol_secrets_dir }}/grafana-ro.pass
    creates: "{{ panol_secrets_dir }}/grafana-ro.pass"
  args:
    executable: /bin/bash
  when: panol_enabled | bool and panol_grafana_enabled | bool

- name: Read the Grafana read-only password
  ansible.builtin.slurp:
    src: "{{ panol_secrets_dir }}/grafana-ro.pass"
  register: panol_grafana_pass_raw
  no_log: true
  when: panol_enabled | bool and panol_grafana_enabled | bool

- name: Create the Grafana read-only role
  community.postgresql.postgresql_user:
    login_host: "127.0.0.1"
    login_port: "{{ panol_pg_port }}"
    login_user: "{{ panol_db_user }}"
    login_password: "{{ panol_db_password }}"
    db: "{{ panol_db_name }}"
    name: "{{ panol_grafana_db_user }}"
    password: "{{ panol_grafana_pass_raw.content | b64decode }}"
  no_log: true
  when: panol_enabled | bool and panol_grafana_enabled | bool

- name: Grant the Grafana role read access
  community.postgresql.postgresql_privs:
    login_host: "127.0.0.1"
    login_port: "{{ panol_pg_port }}"
    login_user: "{{ panol_db_user }}"
    login_password: "{{ panol_db_password }}"
    db: "{{ panol_db_name }}"
    role: "{{ panol_grafana_db_user }}"
    type: "{{ item.type }}"
    objs: "{{ item.objs }}"
    privs: "{{ item.privs }}"
    schema: "{{ item.schema | default(omit) }}"
  loop:
    - { type: database, objs: "{{ panol_db_name }}", privs: CONNECT }
    - { type: schema, objs: public, privs: USAGE }
    - { type: table, objs: ALL_IN_SCHEMA, privs: SELECT, schema: public }
    # Sin esto, una tabla nueva del esquema nace invisible para el panel y el
    # síntoma es un dashboard a medias meses después.
    - { type: default_privs, objs: TABLES, privs: SELECT, schema: public }
  no_log: true
  when: panol_enabled | bool and panol_grafana_enabled | bool

# El datasource se renderiza acá, en el stack de monitoreo, porque necesita un
# secreto que solo este rol conoce. Grafana corre con uid 472: el archivo tiene
# que ser legible por él y por nadie más.
- name: Provision the panol datasource in Grafana
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ stacks_root }}/monitoring/grafana/provisioning/datasources/panol.yml"
    owner: "472"
    group: "472"
    mode: "0640"
  no_log: true
  notify: Restart grafana
  when: panol_enabled | bool and panol_grafana_enabled | bool

# --- Reset de modo prueba (temporal) ---------------------------------------
# Un timer que vacía las dos bases cada pocas horas, preservando usuarios y
# configuración. Existe solo mientras se prueba; se apaga con
# `panol_reset_prueba_enabled: false`. El estado del timer sigue a la variable:
# si se apaga, la tarea de abajo lo detiene y deshabilita.
- name: Deploy the test-reset script
  ansible.builtin.template:
    src: reset-prueba.sh.j2
    dest: "{{ panol_stack_dir }}/reset-prueba.sh"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0750"
  when: panol_enabled | bool

- name: Deploy the test-reset systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - panol-reset-prueba.service
    - panol-reset-prueba.timer
  register: panol_reset_units
  when: panol_enabled | bool

- name: Reload systemd if the units changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: panol_enabled | bool and panol_reset_units is changed

- name: Enable or disable the test-reset timer to match the flag
  ansible.builtin.systemd:
    name: panol-reset-prueba.timer
    enabled: "{{ panol_reset_prueba_enabled | bool }}"
    state: "{{ 'started' if panol_reset_prueba_enabled | bool else 'stopped' }}"
  when: panol_enabled | bool

- name: Announce the test-reset state
  ansible.builtin.debug:
    msg: >-
      Reset de prueba: {{ 'ACTIVO, cada ' ~ panol_reset_prueba_horas ~ ' h'
                          if panol_reset_prueba_enabled | bool
                          else 'apagado' }}.
      EMATP se incluye si existe {{ panol_secrets_dir }}/ematp-db.url
  when: panol_enabled | bool

# --- Firewall ---------------------------------------------------------------
# El puerto MQTT lo publica Docker, así que el tráfico entra por FORWARD y no
# por INPUT: con ufw-docker instalado, la regla que manda es `ufw route`. Una
# `ufw allow 1883` normal NO alcanzaría (y dejaría creer que está cerrado).
- name: Allow MQTT from the device networks
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ item }}"
    port: "{{ panol_mqtt_port }}"
    proto: tcp
    comment: "Panol MQTT from {{ item }}"
  loop: "{{ panol_device_cidrs }}"
  when: panol_enabled | bool

# El firmware del nodo reporta por HTTP a /api/eventos (el MQTT lo habla el
# puente, no la placa). Sin esta regla el ESP32 encola en flash y el sistema
# parece andar... hasta que se mira la base y está vacía.
- name: Allow the panol API from the device networks
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ item }}"
    port: "{{ panol_api_port }}"
    proto: tcp
    comment: "Panol API from {{ item }}"
  loop: "{{ panol_device_cidrs }}"
  when: panol_enabled | bool
