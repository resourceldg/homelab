---
# =============================================================================
# STAGE 1 — BOOTSTRAP (always applied): create the admin/automation account and
# install its SSH keys and sudo rights. This never restricts login, so it is
# safe to run against a fresh box without risking a lockout.
# =============================================================================
- name: Create admin group
  ansible.builtin.group:
    name: "{{ admin_user }}"
    state: present
  tags: [ssh, users, bootstrap]

- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    group: "{{ admin_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
    state: present
  tags: [ssh, users, bootstrap]

- name: Install authorized keys for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ item }}"
    state: present
    exclusive: false
  loop: "{{ admin_ssh_authorized_keys }}"
  tags: [ssh, users, bootstrap]

- name: Passwordless sudo for admin user (automation only)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    owner: root
    group: root
    validate: "visudo -cf %s"
  tags: [ssh, users, bootstrap]

# --- Additional human accounts (multi-user model) --------------------------
# operator = you (in sudo group -> sudo WITH password, no NOPASSWD drop-in);
# familia = daily-use account (no sudo, no SSH). SSH exposure is controlled by
# each user's `ssh` flag, which feeds AllowUsers via ssh_allow_users.
- name: Create additional user accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    create_home: true
    state: present
  loop: "{{ extra_users }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [ssh, users, bootstrap]

- name: Install authorized keys for additional users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ extra_users | subelements('authorized_keys', skip_missing=true) }}"
  loop_control:
    label: "{{ item.0.name }}"
  tags: [ssh, users, bootstrap]

# =============================================================================
# STAGE 2 — LOCKDOWN (gated): deploy the restrictive sshd_config and restart
# sshd. A pre-flight assert refuses to proceed unless a real key is present, so
# the door is never slammed on an unreachable box. Skip with:
#     --skip-tags ssh-lockdown
# =============================================================================
- name: "Safety gate — refuse SSH lockdown without a usable admin key"
  ansible.builtin.assert:
    that:
      - ssh_allow_users | length > 0
      - admin_ssh_authorized_keys | length > 0
      - admin_ssh_authorized_keys | select('search', 'REPLACE_ME') | list | length == 0
    fail_msg: >-
      Refusing to harden SSH: set real key(s) in admin_ssh_authorized_keys
      (no REPLACE_ME placeholder) before enabling lockdown, or you will be
      locked out. To create the user/keys without hardening SSH, run with
      --skip-tags ssh-lockdown first and confirm key access.
    success_msg: "Admin key present — safe to apply the hardened sshd_config."
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: Confirm the admin authorized_keys file is present and non-empty
  ansible.builtin.stat:
    path: "/home/{{ admin_user }}/.ssh/authorized_keys"
  register: users_ssh_authkeys
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: Fail early if the admin has no installed authorized_keys
  ansible.builtin.assert:
    that:
      - users_ssh_authkeys.stat.exists
      - users_ssh_authkeys.stat.size | default(0) | int > 0
    fail_msg: >-
      {{ admin_user }} has no authorized_keys on disk — aborting before the
      hardened sshd_config disables password auth.
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: "Safety gate — SSH-enabled extra users need a real key (no placeholder)"
  ansible.builtin.assert:
    that:
      - item.authorized_keys | default([]) | length > 0
      - item.authorized_keys | select('search', 'REPLACE_ME') | list | length == 0
    fail_msg: >-
      {{ item.name }} is SSH-enabled (in AllowUsers) but has no usable key
      (empty or a REPLACE_ME placeholder). Set a real key or flip its ssh: false
      before hardening, so you never add an unreachable account to AllowUsers.
  loop: "{{ extra_users | selectattr('ssh', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0600"
    owner: root
    group: root
    validate: "sshd -t -f %s"
  notify: Restart sshd
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: Remove weak short Diffie-Hellman moduli
  ansible.builtin.shell: >
    awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.safe &&
    mv /etc/ssh/moduli.safe /etc/ssh/moduli
  args:
    creates: /etc/ssh/.moduli_hardened
  notify: Restart sshd
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]

- name: Mark moduli as hardened
  ansible.builtin.file:
    path: /etc/ssh/.moduli_hardened
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  when: ssh_lockdown_enabled | bool
  tags: [ssh, ssh-lockdown]
