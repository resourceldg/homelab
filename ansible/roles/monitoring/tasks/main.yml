---
- name: Deploy proxy and monitoring stacks
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/{{ item }}/"
    dest: "{{ stacks_root }}/{{ item }}/"
    mode: "0644"
    # 0755 so in-container service users (e.g. the Grafana uid 472) can read the
    # mounted config/provisioning dirs. No secrets live here — the .env files are
    # rendered separately with 0600.
    directory_mode: "0755"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  loop:
    - proxy
    - monitoring
    - dashboard
  notify: Restart caddy proxy
  when: monitoring_enabled | bool

- name: Render proxy .env (DuckDNS token + domain for Caddy TLS)
  ansible.builtin.template:
    src: proxy.env.j2
    dest: "{{ stacks_root }}/proxy/.env"
    mode: "0600"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  no_log: true

- name: Render monitoring .env (Grafana admin password)
  ansible.builtin.template:
    src: monitoring.env.j2
    dest: "{{ stacks_root }}/monitoring/.env"
    mode: "0600"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  no_log: true

- name: Render dashboard .env (allowed hosts + base domain for Homepage)
  ansible.builtin.template:
    src: dashboard.env.j2
    dest: "{{ stacks_root }}/dashboard/.env"
    mode: "0644"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  when: dashboard_enabled | bool

- name: Bring up the proxy stack
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_root }}/proxy"
    state: present
    pull: missing

- name: Bring up the monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_root }}/monitoring"
    state: present
    pull: missing
  when: monitoring_enabled | bool

- name: Bring up the dashboard stack
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_root }}/dashboard"
    state: present
    pull: missing
  when: dashboard_enabled | bool

# --- Logs en vivo (efímero, apagado por defecto) ---------------------------
# Se instala pero NO se levanta: indexar los logs de todos los contenedores
# cuesta RAM y disco de forma permanente, y este servidor también corre el
# laboratorio del aula. Lo prende `logs-en-vivo`, que además lo apaga solo.
- name: Deploy the live-logs stack (installed, not started)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/logs/"
    dest: "{{ stacks_root }}/logs/"
    mode: "0644"
    directory_mode: "0755"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
  when: logs_enabled | bool

- name: Install the live-logs switch
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/logs-en-vivo.sh"
    dest: /usr/local/bin/logs-en-vivo
    owner: root
    group: root
    mode: "0755"
  when: logs_enabled | bool
