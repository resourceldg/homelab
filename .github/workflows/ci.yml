---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: Prepare non-secret placeholders
        run: |
          # CI never has the real vault. Use the committed example so playbooks
          # parse; values are all placeholders.
          cp ansible/group_vars/all/vault.yml.example ansible/group_vars/all/vault.yml
          echo "ci-not-a-real-password" > .vault_pass

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

  syntax:
    name: Playbook syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Prepare non-secret placeholders
        run: |
          cp ansible/group_vars/all/vault.yml.example ansible/group_vars/all/vault.yml
          echo "ci-not-a-real-password" > .vault_pass

      - name: Syntax check
        working-directory: ansible
        run: ansible-playbook site.yml --syntax-check

  molecule:
    name: Molecule (ddns role, systemd container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Molecule
        run: |
          python -m pip install --upgrade pip
          pip install "molecule-plugins[docker]" molecule ansible-core docker
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule
        working-directory: ansible/roles/ddns
        env:
          ANSIBLE_FORCE_COLOR: "1"
        run: molecule test
