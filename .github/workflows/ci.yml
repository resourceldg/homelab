---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (labctl policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run unit tests (policy + dashboards)
        run: pytest tests/test_labctl_policy.py tests/test_dashboards.py -q

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # scan full history, not just the tip commit

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: Prepare non-secret placeholders
        run: |
          # CI never has the real vault. Use the committed per-env examples so
          # playbooks parse; values are all placeholders.
          for env in production staging; do
            cp "ansible/inventories/$env/group_vars/all/vault.yml.example" \
               "ansible/inventories/$env/group_vars/all/vault.yml"
          done
          echo "ci-not-a-real-password" > ~/.vault_pass   # ansible.cfg vault_password_file

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

  syntax:
    name: Playbook syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Prepare non-secret placeholders
        run: |
          for env in production staging; do
            cp "ansible/inventories/$env/group_vars/all/vault.yml.example" \
               "ansible/inventories/$env/group_vars/all/vault.yml"
          done
          echo "ci-not-a-real-password" > ~/.vault_pass   # ansible.cfg vault_password_file

      - name: Syntax check (both environments)
        working-directory: ansible
        run: |
          ansible-playbook site.yml -i inventories/production --syntax-check
          ansible-playbook site.yml -i inventories/staging --syntax-check

  molecule:
    name: Molecule (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 2404 = 24.04 noble (versión de producción). 22.04 quedó fuera de soporte.
        ubuntu: ["2404"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Molecule
        run: |
          python -m pip install --upgrade pip
          pip install "molecule-plugins[docker]" molecule ansible-core docker
          ansible-galaxy collection install -r requirements.yml

      - name: Molecule — ddns role
        working-directory: ansible/roles/ddns
        env:
          UBUNTU_IMAGE_TAG: ${{ matrix.ubuntu }}
          ANSIBLE_FORCE_COLOR: "1"
        run: molecule test

      - name: Molecule — backups role (exercises borgmatic schema per version)
        working-directory: ansible/roles/backups
        env:
          UBUNTU_IMAGE_TAG: ${{ matrix.ubuntu }}
          ANSIBLE_FORCE_COLOR: "1"
        run: molecule test
