---
name: monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # 'edge' lets Caddy reach it; the Caddy site gates it to tailnet/LAN.
    networks: [monitoring, edge]
    # Also bind to loopback for local debugging; never on a routable interface.
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "https://grafana.${GRAFANA_DOMAIN}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Access is gated by Authelia (operators + students). Anyone who gets past
      # Authelia views dashboards as Viewer without a Grafana account; the
      # operator elevates by signing in with the admin user above.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [monitoring, edge]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    command:
      - "--path.rootfs=/host"
      - "--collector.systemd"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [monitoring]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices: ["/dev/kmsg"]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # 'edge' lets Caddy reach it; the Caddy site gates it to tailnet/LAN.
    networks: [monitoring, edge]

networks:
  monitoring:
  edge:
    external: true

volumes:
  prometheus_data:
  grafana_data:
