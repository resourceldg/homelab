# Broker MQTT del proyecto Pañol IoT.
#
# Este archivo es estático (lo copia el rol `panol`). Lo que cambia por entorno
# —usuarios y permisos— vive en `passwd` y `acl`, generados por Ansible.

listener 1883
protocol mqtt

listener 9001
protocol websockets

# --- Autenticación --------------------------------------------------------
# CERRADO por diseño. Un broker anónimo en la red del colegio permitiría que
# cualquiera publique un `acceso CONCEDIDO` falso y abra una sesión a nombre de
# otro: la auditoría dejaría de valer. Las credenciales las genera el rol y
# quedan en /etc/panol/secrets/ (solo root).
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# --- Persistencia ---------------------------------------------------------
# Si el broker se reinicia, las sesiones con clean_session=false y sus mensajes
# QoS 1 pendientes sobreviven. Es lo que evita que un corte se lleve eventos de
# auditoría que ya salieron del nodo pero todavía no llegaron al servidor.
persistence true
persistence_location /mosquitto/data/
autosave_interval 30

# Cola por cliente desconectado. Un nodo que estuvo caído un rato recupera lo
# suyo; un nodo que estuvo caído un día no llena el disco del servidor.
max_queued_messages 1000
message_size_limit 8192

# --- Logs -----------------------------------------------------------------
# A stdout para que queden en journald vía el driver json-file de Docker
# (rotado por daemon.json), y a archivo para inspección rápida en el volumen.
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
connection_messages true
