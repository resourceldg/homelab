# gitleaks config — extend the default ruleset with a homelab allowlist so the
# committed placeholder secrets (templates, examples) never trip the scanner.
[extend]
useDefault = true

[allowlist]
description = "Placeholders and committed examples — never real secrets"
paths = [
  '''.*\.example$''',
  '''ansible/inventories/.*/group_vars/all/vault\.yml\.example''',
]
regexes = [
  '''REPLACE_WITH_[A-Z_]+''',
  '''AAAA\.\.\.REPLACE_ME''',
  '''ci-not-a-real-password''',
  # Credenciales por defecto del plano Pañol IoT: conocidas a propósito para
  # que el sistema arranque andando, y nombradas para que se vea que hay que
  # cambiarlas (ver docs/panol-iot.md).
  '''cambiar-[a-z-]+''',
]
